{% extends "base.html" %}

{% block content %}
<div class="container mt-5 text-center">
    <div class="card shadow p-5 border-danger">
        <div class="mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="red" class="bi bi-x-circle-fill" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293 5.354 4.646z"/>
            </svg>
        </div>
        <h1 class="display-4 text-danger">Payment Failed</h1>
        <p class="lead">We couldn't process your payment at this time.</p>
        <p>Please check your card details or try a different payment method.</p>
        <div class="mt-4">
            <a href="{% url 'cart:cart_detail' %}" class="btn btn-warning">Return to Cart</a>
        </div>
    </div>
</div>
{% endblock %}
